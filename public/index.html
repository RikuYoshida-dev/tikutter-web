<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SNS Tikutter</title>
<style>
  /* === お前のカッコええデザイン（CSSバフ） === */
  body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; }
  .timeline { width: 100%; max-width: 600px; background-color: white; min-height: 100vh; border-left: 1px solid #ccc; border-right: 1px solid #ccc; }
  .header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #eee; background-color: rgba(255,255,255,0.9); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  .auth-area { font-size: 14px; font-weight: normal; display: flex; align-items: center; gap: 10px; }
  .auth-btn { background: #fff; border: 1px solid #ccc; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
  .post-box { padding: 15px; border-bottom: 10px solid #f0f2f5; }
  .post-input { width: 100%; height: 80px; border: none; resize: none; font-size: 18px; outline: none; }
  .post-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .add-image { color: #1d9bf0; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 15px; }
  .post-btn { background-color: #1d9bf0; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
  .post-btn:disabled { background-color: #ccc; cursor: not-allowed; }
  .tweet { padding: 15px; border-bottom: 1px solid #eee; animation: fadeIn 0.5s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .user-info { font-weight: bold; margin-bottom: 5px; }
  .user-id { color: #666; font-size: 14px; font-weight: normal; margin-left: 5px;}
  .tweet-text { margin-bottom: 10px; word-break: break-all; white-space: pre-wrap; }
  .action-btns { display: flex; gap: 20px; color: #536471; font-size: 14px; }
</style>
</head>
<body>

<div class="timeline">
  <div class="header">
    <span>ホーム</span>
    <div class="auth-area">
      <span id="userNameDisplay">未ログイン💀</span>
      <button id="loginBtn" class="auth-btn" onclick="login()">ログイン</button>
      <button id="logoutBtn" class="auth-btn" onclick="logout()" style="display: none;">ログアウト</button>
    </div>
  </div>

  <div class="post-box">
    <textarea id="myInput" class="post-input" placeholder="ログインすると世界に叫べるぞ！" disabled></textarea>
    <div class="post-actions">
      <span class="add-image">📷 画像を追加</span>
      <button id="postBtn" class="post-btn" onclick="sendPost()" disabled>投稿する</button>
    </div>
  </div>
  
  <div id="feed"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
  // 👇 認証用の新しい魔法（Auth）をインポート！
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  const firebaseConfig = {
    // 👇 これが本物の鍵や！この1行をそのまま上書きしたれ！
apiKey: "AIzaSyBwmjTxHuhEvwa8LGjSGO37c6i-EvyamC8",
    authDomain: "tikutter.firebaseapp.com",
    projectId: "tikutter",
    storageBucket: "tikutter.firebasestorage.app",
    messagingSenderId: "118705198737",
    appId: "1:118705198737:web:47b10639061cc59142d130",
    measurementId: "G-CGGYZPPYZ8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // 認証の魔法使いを召喚
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  let currentUser = null; // 今ログインしてる奴のデータを保持する箱や！

  // --- ログイン＆ログアウトの魔法 ---
  window.login = async function() {
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      console.error("ログイン失敗や！", e);
    }
  };

  window.logout = async function() {
    await signOut(auth);
  };

  // --- ログイン状態を監視する強力なパッシブスキル ---
  onAuthStateChanged(auth, (user) => {
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userNameDisplay = document.getElementById("userNameDisplay");
    const postBtn = document.getElementById("postBtn");
    const myInput = document.getElementById("myInput");

    if (user) {
      // ログイン成功バフ！
      currentUser = user;
      userNameDisplay.textContent = user.displayName + " 🔥";
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      postBtn.disabled = false;
      myInput.disabled = false;
      myInput.placeholder = "いまどうしてる？";
    } else {
      // ログアウト状態（デバフ）
      currentUser = null;
      userNameDisplay.textContent = "未ログイン💀";
      loginBtn.style.display = "inline-block";
      logoutBtn.style.display = "none";
      postBtn.disabled = true;
      myInput.disabled = true;
      myInput.placeholder = "ログインすると世界に叫べるぞ！";
    }
  });

  // --- 投稿をFirebaseに送る魔法（ログイン中だけ発動！） ---
  window.sendPost = async function() {
    if (!currentUser) return; // ログインしてへんかったら弾く！

    const input = document.getElementById("myInput");
    const btn = document.getElementById("postBtn");
    const text = input.value;

    if (text.trim() === "") return;

    btn.disabled = true;
    try {
      await addDoc(collection(db, "posts"), {
        text: text,
        createdAt: serverTimestamp(),
        userId: currentUser.displayName, // 👈 ここが固定の名前から「Googleのユーザー名」に進化や！
        likes: 0,
        retweets: 0
      });
      input.value = "";
    } catch (e) {
      console.error("保存失敗や！: ", e);
    }
    btn.disabled = false;
  };

  // --- 画面に投稿とボタンを表示する魔法 ---
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = ""; 
    
    snapshot.forEach((doc) => {
      const post = doc.data();
      const date = post.createdAt ? post.createdAt.toDate().toLocaleString('ja-JP') : "送信中...";

      const tweetHtml = `
        <div class="tweet">
          <div class="user-info">
            ${post.userId || "名無し"} <span class="user-id">@user</span>
            <span style="color: #666; font-size: 12px; font-weight: normal; margin-left: 5px;">${date}</span>
          </div>
          <div class="tweet-text">${post.text}</div>
          <div class="action-btns">
            <span style="cursor:pointer;">🔄 ${post.retweets || 0}</span>
            <span style="cursor:pointer;">❤️ ${post.likes || 0}</span>
          </div>
        </div>
      `;
      feed.insertAdjacentHTML('beforeend', tweetHtml);
    });
  });
</script>

</body>
</html>
