<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tikutter</title>
<style>
  * { box-sizing: border-box; } /* はみ出し防止バフ */
  body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; }
  .timeline { width: 100%; max-width: 600px; background-color: white; min-height: 100vh; border-left: 1px solid #ccc; border-right: 1px solid #ccc; padding-bottom: 80px; }
  .header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #eee; background-color: rgba(255,255,255,0.9); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  
  /* 👇 通知のベルマークと赤いバッジ（通知数）のデザインや！ */
  .header-icons { display: flex; align-items: center; gap: 15px; }
  .notif-icon-wrap { position: relative; cursor: pointer; font-size: 22px; }
  .notif-badge { position: absolute; top: -5px; right: -5px; background: #f4212e; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 50%; display: none; }
  
  .auth-btn { background: #fff; border: 1px solid #ccc; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
  
  .tabs { display: flex; border-bottom: 1px solid #eee; background: white; }
  .tab { flex: 1; text-align: center; padding: 12px 5px; cursor: pointer; color: #536471; font-weight: bold; transition: 0.2s; font-size: 14px; }
  .tab:hover { background-color: #f0f2f5; }
  .tab.active { color: #0f1419; border-bottom: 4px solid #1d9bf0; }

  .post-box { padding: 15px; border-bottom: 10px solid #f0f2f5; }
  .post-input { width: 100%; height: 80px; border: none; resize: none; font-size: 18px; outline: none; }
  .post-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .post-btn { background-color: #1d9bf0; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
  .post-btn:disabled { background-color: #ccc; cursor: not-allowed; }
  
  .tweet { padding: 15px; border-bottom: 1px solid #eee; animation: fadeIn 0.5s; display: flex; gap: 10px; }
  .tweet-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: #ccc; flex-shrink: 0; cursor: pointer; }
  .tweet-content { width: 100%; overflow: hidden; }
  .tweet-text-area { cursor: pointer; margin-bottom: 10px; word-break: break-all; white-space: pre-wrap; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .user-info { font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
  .user-name-box { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-id { color: #666; font-size: 12px; font-weight: normal; margin-left: 5px;}
  .delete-btn { color: #f4212e; cursor: pointer; padding: 0 5px; font-size: 18px; }
  
  .action-btns { display: flex; justify-content: space-between; font-size: 14px; user-select: none; margin-top: 5px; padding-right: 20px; }
  .action-item { display: flex; align-items: center; gap: 5px; }
  .action-icon { cursor: pointer; }
  .action-count { cursor: pointer; font-weight: bold; }

  .profile-header { text-align: center; padding: 20px; border-bottom: 10px solid #f0f2f5; }
  .profile-icon-large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); margin-bottom: 10px; }
  .bio-display { margin-top: 10px; white-space: pre-wrap; word-break: break-all; font-size: 14px; }
  .edit-bio-box { margin-top: 15px; display: none; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; }
  .bio-input, .name-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; font-family: sans-serif; }
  
  .follow-stats { display: flex; justify-content: center; gap: 20px; font-size: 14px; margin-top: 10px; margin-bottom: 15px; }
  .follow-btn { padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; border: 1px solid #ccc; background: white; color: black; display: none; margin: 0 auto; }
  .follow-btn.following { background: #0f1419; color: white; border: none; }
  
  .reply-box { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
  
  /* 👇 【新規】左下のTボタン（FAB）の魔法！ */
  .fab-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; border-radius: 50%; background: #1d9bf0; color: white; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; transition: transform 0.2s; }
  .fab-btn:active { transform: scale(0.9); }

  /* 👇 【新規】スマホ画面（画面幅600px以下）の時のスリム化バフ！ */
  @media (max-width: 600px) {
    .timeline { border-left: none; border-right: none; }
    .header { font-size: 18px; padding: 10px 15px; }
    .tweet { padding: 12px; gap: 8px; }
    .tweet-icon { width: 40px; height: 40px; }
    .action-btns { padding-right: 0; }
    .fab-btn { bottom: 15px; left: 15px; width: 55px; height: 55px; font-size: 24px; }
  }
</style>
</head>
<body>

<div id="timelineView" class="timeline">
  <div class="header">
    <span>Tikutter</span>
    <div class="header-icons">
      <div class="notif-icon-wrap" onclick="openNotifications()">
        🔔<span id="notifBadge" class="notif-badge">0</span>
      </div>
      <button id="loginBtn" class="auth-btn" onclick="login()">ログイン</button>
      <button id="logoutBtn" class="auth-btn" onclick="logout()" style="display: none;">ログアウト</button>
    </div>
  </div>

  <div class="tabs">
    <div id="tabRecommend" class="tab active" onclick="switchTab('recommend')">おすすめ</div>
    <div id="tabLatest" class="tab" onclick="switchTab('latest')">最新</div>
    <div id="tabFollowing" class="tab" onclick="switchTab('following')">フォロー中</div>
  </div>

  <div class="post-box">
    <textarea id="myInput" class="post-input" placeholder="いまどうしてる？" disabled></textarea>
    <div class="post-actions">
      <span style="color: #1d9bf0; font-weight: bold; font-size: 14px;">📷 画像</span>
      <button id="postBtn" class="post-btn" onclick="sendPost()" disabled>投稿する</button>
    </div>
  </div>
  
  <div id="feed"></div>
</div>

<div id="profileView" class="timeline" style="display: none;">
  <div class="header">
    <button class="back-btn" onclick="switchView('timelineView')">←</button>
    <span id="profileHeaderName" style="font-size: 18px;">プロフィール</span>
    <div style="width: 20px;"></div>
  </div>
  <div class="profile-header">
    <img id="profilePageIcon" src="" class="profile-icon-large" alt="アイコン">
    <h2 id="profilePageName" style="margin: 0; font-size: 20px;">名前</h2>
    <div class="follow-stats">
      <span><b id="followingCount">0</b> フォロー中</span>
      <span><b id="followerCount">0</b> フォロワー</span>
    </div>
    <button id="followBtn" class="follow-btn" onclick="toggleFollow()">フォローする</button>
    <div id="profilePageBio" class="bio-display">読み込み中...</div>
    <div id="editBioBox" class="edit-bio-box">
      <span class="edit-label">名前</span>
      <input type="text" id="nameInputField" class="name-input" placeholder="新しい名前">
      <span class="edit-label">BIO</span>
      <textarea id="bioInputField" class="bio-input" placeholder="自己紹介を熱く語れ！"></textarea><br>
      <button class="post-btn" style="width: 100%;" onclick="saveProfile()">更新する🔥</button>
    </div>
  </div>
  <div id="profileFeed"></div>
</div>

<div id="detailView" class="timeline" style="display: none;">
  <div class="header">
    <button class="back-btn" onclick="switchView('timelineView')">←</button>
    <span style="font-size: 18px;">ツイート</span>
    <div style="width: 20px;"></div>
  </div>
  <div id="parentPostArea"></div>
  <div class="post-box reply-box">
    <textarea id="replyInput" class="post-input" placeholder="返信をポスト..." disabled></textarea>
    <div class="post-actions">
      <span></span>
      <button id="replyBtn" class="post-btn" onclick="sendReply()" disabled>返信する</button>
    </div>
  </div>
  <div id="repliesFeed"></div>
</div>

<div id="reactionUsersView" class="timeline" style="display: none;">
  <div class="header">
    <button class="back-btn" onclick="switchView('detailView')">←</button>
    <span id="reactionHeaderTitle" style="font-size: 18px;">反応したユーザー</span>
    <div style="width: 20px;"></div>
  </div>
  <div id="reactionUsersList"></div>
</div>

<div id="notifView" class="timeline" style="display: none;">
  <div class="header">
    <button class="back-btn" onclick="switchView('timelineView')">←</button>
    <span style="font-size: 18px;">通知</span>
    <div style="width: 20px;"></div>
  </div>
  <div id="notifFeed"></div>
</div>

<div class="fab-btn" onclick="focusPostBox()">T</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, getDoc, arrayUnion, arrayRemove, setDoc, where, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwmjTxHuhEvwa8LGjSGO37c6i-EvyamC8",
    authDomain: "tikutter.firebaseapp.com",
    projectId: "tikutter",
    storageBucket: "tikutter.firebasestorage.app",
    messagingSenderId: "118705198737",
    appId: "1:118705198737:web:47b10639061cc59142d130",
    measurementId: "G-CGGYZPPYZ8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  
  let currentUser = null; 
  let currentProfileUid = null; 
  let currentDetailPostId = null; 
  let profileUnsubscribe = null; 
  let detailUnsubscribe = null; 
  let myUnsubscribe = null; 
  let notifUnsubscribe = null; // 通知監視用

  let currentTab = 'recommend'; // 初期タブを「おすすめ」に変更！
  let allPostsData = []; 
  let myFollowingList = []; 
  let unreadNotifDocs = []; // 未読の通知箱

  // --- SPA画面切り替え ---
  window.switchView = function(viewId) {
    const views = ["timelineView", "profileView", "detailView", "reactionUsersView", "notifView"];
    views.forEach(id => document.getElementById(id).style.display = "none");
    document.getElementById(viewId).style.display = "block";
    window.scrollTo(0, 0); // 画面変えたら一番上に戻すバフ！

    if(viewId === 'timelineView') {
      if (profileUnsubscribe) { profileUnsubscribe(); profileUnsubscribe = null; } 
      if (detailUnsubscribe) { detailUnsubscribe(); detailUnsubscribe = null; }
    }
  };

  // 左下の「T」ボタンを押した時の魔法
  window.focusPostBox = function() {
    switchView('timelineView');
    document.getElementById("myInput").focus();
  };

  window.login = async function() {
    try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
  };
  window.logout = async function() { await signOut(auth); };

  onAuthStateChanged(auth, async (user) => {
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const postBtn = document.getElementById("postBtn");
    const replyBtn = document.getElementById("replyBtn");
    const myInput = document.getElementById("myInput");
    const replyInput = document.getElementById("replyInput");

    if (user) {
      currentUser = user;
      loginBtn.style.display = "none"; logoutBtn.style.display = "inline-block";
      postBtn.disabled = false; myInput.disabled = false;
      replyBtn.disabled = false; replyInput.disabled = false;

      await setDoc(doc(db, "users", user.uid), { displayName: user.displayName, photoURL: user.photoURL }, { merge: true });

      if(myUnsubscribe) myUnsubscribe();
      myUnsubscribe = onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
        if(docSnap.exists()) myFollowingList = docSnap.data().following || [];
        renderMainFeed(); 
      });

      // 🔥 【新規】通知を監視する魔法！
      if(notifUnsubscribe) notifUnsubscribe();
      const nq = query(collection(db, "notifications"), where("targetUid", "==", currentUser.uid));
      notifUnsubscribe = onSnapshot(nq, (snapshot) => {
        unreadNotifDocs = [];
        let notifs = [];
        snapshot.forEach(doc => {
          notifs.push({ id: doc.id, data: doc.data() });
          if(!doc.data().isRead) unreadNotifDocs.push(doc.id);
        });
        
        // バッジの数字を更新！
        const badge = document.getElementById("notifBadge");
        if(unreadNotifDocs.length > 0) {
          badge.textContent = unreadNotifDocs.length;
          badge.style.display = "inline-block";
        } else {
          badge.style.display = "none";
        }
        
        // 通知画面を描画（クライアント側で時間順にソートするバフ！）
        notifs.sort((a,b) => (b.data.createdAt?.toMillis() || 0) - (a.data.createdAt?.toMillis() || 0));
        renderNotifs(notifs);
      });

    } else {
      currentUser = null;
      loginBtn.style.display = "inline-block"; logoutBtn.style.display = "none";
      postBtn.disabled = true; myInput.disabled = true;
      replyBtn.disabled = true; replyInput.disabled = true;
      myFollowingList = [];
      document.getElementById("notifBadge").style.display = "none";
      if(myUnsubscribe) myUnsubscribe();
      if(notifUnsubscribe) notifUnsubscribe();
    }
  });

  // 🔥 【新規】通知画面を開いた時の魔法！
  window.openNotifications = function() {
    if(!currentUser) { alert("ログインせんと見れへんぞ！💀"); return; }
    switchView('notifView');
    
    // 開いた瞬間に未読バッジを消して、DB側も「既読」にする！
    document.getElementById("notifBadge").style.display = "none";
    unreadNotifDocs.forEach(notifId => {
      updateDoc(doc(db, "notifications", notifId), { isRead: true });
    });
    unreadNotifDocs = [];
  };

  // 通知一覧を描画する関数
  function renderNotifs(notifs) {
    const feed = document.getElementById("notifFeed");
    if(notifs.length === 0) {
      feed.innerHTML = "<div style='padding:20px; text-align:center; color:#536471;'>通知はまだないぞ！</div>";
      return;
    }
    let html = '';
    notifs.forEach(n => {
      const data = n.data;
      const time = data.createdAt ? data.createdAt.toDate().toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'}) : "";
      let msg = data.type === 'like' ? '❤️ あなたの投稿にいいねしました' : '💬 あなたの投稿に返信しました';
      html += `
        <div class="tweet" style="cursor: pointer;" onclick="openTweetDetail('${data.postId}')">
          <img src="${data.fromIcon || 'https://via.placeholder.com/48'}" class="tweet-icon">
          <div style="width: 100%;">
            <div style="font-weight:bold; font-size:14px;">${data.fromName} <span style="font-weight:normal; color:#666; font-size:12px;">${time}</span></div>
            <div style="color:#536471; font-size:14px; margin-top:5px;">${msg}</div>
          </div>
        </div>`;
    });
    feed.innerHTML = html;
  }

  // --- ツイート描画 ---
  function renderTweetHtml(docId, post, isReply = false) {
    const date = post.createdAt ? post.createdAt.toDate().toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'}) : "送信中...";
    const likesArray = Array.isArray(post.likes) ? post.likes : [];
    const isLiked = currentUser ? likesArray.includes(currentUser.uid) : false;
    const heartColor = isLiked ? "#f91880" : "#536471";

    const rtArray = Array.isArray(post.retweets) ? post.retweets : [];
    const isRt = currentUser ? rtArray.includes(currentUser.uid) : false;
    const rtColor = isRt ? "#00ba7c" : "#536471";
    
    const replyCount = post.replyCount || 0;
    const iconUrl = post.userIcon || "https://via.placeholder.com/48/cccccc/ffffff?text=User";

    const isMine = currentUser && currentUser.uid === post.uid;
    const deleteBtnHtml = isMine ? `<span class="delete-btn" onclick="deletePost('${docId}', ${isReply})">※</span>` : ``;

    const actionBtns = isReply ? 
      `<div class="action-item">
         <span class="action-icon" onclick="likeReply('${docId}')" style="color: ${heartColor};">❤️</span>
         <span class="action-count" onclick="openReactions('${docId}', 'likes', true)" style="color: ${heartColor};">${likesArray.length}</span>
       </div>` :
      `<div class="action-item">
         <span class="action-icon" onclick="openTweetDetail('${docId}')">💬</span>
         <span class="action-count" onclick="openTweetDetail('${docId}')">${replyCount}</span>
       </div>
       <div class="action-item">
         <span class="action-icon" onclick="rtPost('${docId}')" style="color: ${rtColor};">🔄</span>
         <span class="action-count" onclick="openReactions('${docId}', 'retweets', false)" style="color: ${rtColor};">${rtArray.length}</span>
       </div>
       <div class="action-item">
         <span class="action-icon" onclick="likePost('${docId}')" style="color: ${heartColor};">❤️</span>
         <span class="action-count" onclick="openReactions('${docId}', 'likes', false)" style="color: ${heartColor};">${likesArray.length}</span>
       </div>`;

    return `
      <div class="tweet">
        <img src="${iconUrl}" class="tweet-icon" onclick="openProfile('${post.uid}', '${post.userId}', '${iconUrl}')">
        <div class="tweet-content">
          <div class="user-info">
            <div class="user-name-box">${post.userId || "名無し"} <span class="user-id">@user</span> <span style="color: #666; font-size: 11px; font-weight: normal; margin-left: 5px;">${date}</span></div>
            ${deleteBtnHtml}
          </div>
          <div class="tweet-text-area" onclick="${isReply ? '' : `openTweetDetail('${docId}')`}">${post.text}</div>
          <div class="action-btns">
            ${actionBtns}
          </div>
        </div>
      </div>
    `;
  }

  window.sendPost = async function() {
    if (!currentUser) return;
    const input = document.getElementById("myInput");
    const text = input.value;
    if (text.trim() === "") return;
    document.getElementById("postBtn").disabled = true;
    try {
      await addDoc(collection(db, "posts"), { text: text, createdAt: serverTimestamp(), userId: currentUser.displayName, userIcon: currentUser.photoURL, uid: currentUser.uid, likes: [], retweets: [], replyCount: 0 });
      input.value = "";
    } catch (e) { console.error(e); }
    document.getElementById("postBtn").disabled = false;
  };

  window.deletePost = async function(docId, isReply) {
    if (!currentUser) return;
    if (confirm("このツイートをガチで消去するんか？💀")) {
      try {
        await deleteDoc(doc(db, isReply ? "replies" : "posts", docId));
        if (!isReply && document.getElementById('detailView').style.display === 'block') switchView('timelineView');
      } catch (e) { console.error(e); }
    }
  };

  window.openReactions = async function(docId, type, isReply) {
    switchView('reactionUsersView');
    document.getElementById('reactionHeaderTitle').textContent = type === 'likes' ? '❤️ いいねした人' : '🔄 リツイートした人';
    const listArea = document.getElementById('reactionUsersList');
    listArea.innerHTML = "<div style='padding: 20px; text-align: center;'>読み込み中...</div>";
    
    const docSnap = await getDoc(doc(db, isReply ? "replies" : "posts", docId));
    if (!docSnap.exists() || !docSnap.data()[type] || docSnap.data()[type].length === 0) {
      listArea.innerHTML = "<div style='padding: 20px; text-align: center; color: #536471;'>まだ誰も反応してへんぞ💀</div>";
      return;
    }
    
    let html = '';
    const userSnaps = await Promise.all(docSnap.data()[type].map(uid => getDoc(doc(db, "users", uid))));
    userSnaps.forEach(userSnap => {
      let name = "名無し", icon = "https://via.placeholder.com/48", uid = "";
      if (userSnap.exists()) { name = userSnap.data().displayName || name; icon = userSnap.data().photoURL || icon; uid = userSnap.id; }
      html += `<div class="tweet" style="align-items: center; cursor: pointer;" onclick="openProfile('${uid}', '${name}', '${icon}')"><img src="${icon}" class="tweet-icon"><div style="font-weight: bold; font-size: 16px;">${name}</div></div>`;
    });
    listArea.innerHTML = html;
  };

  // 🔥 【強化】いいねした時に「通知（notifications）」を送る魔法！
  window.likePost = async function(postId) {
    if (!currentUser) return;
    const ref = doc(db, "posts", postId);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const post = snap.data();
      const arr = Array.isArray(post.likes) ? post.likes : [];
      const isAdding = !arr.includes(currentUser.uid);
      await updateDoc(ref, { likes: isAdding ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid) });
      
      // 自分が自分にいいねした時は通知を送らない防御バフ
      if(isAdding && post.uid !== currentUser.uid) {
        addDoc(collection(db, "notifications"), { targetUid: post.uid, fromUid: currentUser.uid, fromName: currentUser.displayName, fromIcon: currentUser.photoURL, type: 'like', postId: postId, isRead: false, createdAt: serverTimestamp() });
      }
    }
  };
  
  window.rtPost = async function(postId) { /* 変更なし短縮 */
    if (!currentUser) return; const ref = doc(db, "posts", postId); const snap = await getDoc(ref);
    if (snap.exists()) await updateDoc(ref, { retweets: !snap.data().retweets?.includes(currentUser.uid) ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid) });
  };
  window.likeReply = async function(replyId) { /* 変更なし短縮 */
    if (!currentUser) return; const ref = doc(db, "replies", replyId); const snap = await getDoc(ref);
    if (snap.exists()) await updateDoc(ref, { likes: !snap.data().likes?.includes(currentUser.uid) ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid) });
  };

  window.openTweetDetail = async function(postId) {
    switchView('detailView'); currentDetailPostId = postId;
    const parentSnap = await getDoc(doc(db, "posts", postId));
    if(parentSnap.exists()) document.getElementById("parentPostArea").innerHTML = renderTweetHtml(parentSnap.id, parentSnap.data());

    const repliesFeed = document.getElementById("repliesFeed");
    repliesFeed.innerHTML = "<div style='text-align:center; padding:20px;'>読み込み中...</div>";
    if (detailUnsubscribe) detailUnsubscribe();
    detailUnsubscribe = onSnapshot(query(collection(db, "replies"), where("postId", "==", postId), orderBy("createdAt", "asc")), (snapshot) => {
      repliesFeed.innerHTML = ""; snapshot.forEach((doc) => { repliesFeed.insertAdjacentHTML('beforeend', renderTweetHtml(doc.id, doc.data(), true)); });
    });
  };

  // 🔥 【強化】リプした時にも「通知」を送る魔法！
  window.sendReply = async function() {
    if (!currentUser || !currentDetailPostId) return;
    const input = document.getElementById("replyInput");
    const text = input.value;
    if (text.trim() === "") return;
    document.getElementById("replyBtn").disabled = true;
    try {
      await addDoc(collection(db, "replies"), { postId: currentDetailPostId, text: text, createdAt: serverTimestamp(), userId: currentUser.displayName, userIcon: currentUser.photoURL, uid: currentUser.uid, likes: [] });
      await updateDoc(doc(db, "posts", currentDetailPostId), { replyCount: increment(1) });
      
      const parentSnap = await getDoc(doc(db, "posts", currentDetailPostId));
      if(parentSnap.exists()) {
        document.getElementById("parentPostArea").innerHTML = renderTweetHtml(parentSnap.id, parentSnap.data());
        // 通知を送る！
        if(parentSnap.data().uid !== currentUser.uid) {
           addDoc(collection(db, "notifications"), { targetUid: parentSnap.data().uid, fromUid: currentUser.uid, fromName: currentUser.displayName, fromIcon: currentUser.photoURL, type: 'reply', postId: currentDetailPostId, isRead: false, createdAt: serverTimestamp() });
        }
      }
      input.value = "";
    } catch (e) { console.error(e); }
    document.getElementById("replyBtn").disabled = false;
  };

  // 🔥 【進化】3つのタブ切り替え魔法！
  window.switchTab = function(tabName) {
    if(tabName === 'following' && !currentUser) { alert("ログインせんと見れへんぞ！💀"); return; }
    currentTab = tabName;
    ["tabRecommend", "tabLatest", "tabFollowing"].forEach(id => document.getElementById(id).classList.remove("active"));
    
    if(tabName === 'recommend') document.getElementById("tabRecommend").classList.add("active");
    else if(tabName === 'latest') document.getElementById("tabLatest").classList.add("active");
    else document.getElementById("tabFollowing").classList.add("active");
    
    renderMainFeed();
  };

  // 🔥 【進化】フロントエンドでの「おすすめ並び替え」＆「フィルター」魔法！
  function renderMainFeed() {
    const feed = document.getElementById("feed");
    if(!feed) return;
    feed.innerHTML = ""; 
    
    // 一時的な配列を作って、タブごとに中身を操作する！
    let displayPosts = [...allPostsData];

    if (currentTab === 'recommend') {
      // おすすめタブ：いいねが多い順に並び替える（インデックス不要のクライアントサイドソート！）
      displayPosts.sort((a, b) => {
        const aLikes = a.data.likes ? a.data.likes.length : 0;
        const bLikes = b.data.likes ? b.data.likes.length : 0;
        return bLikes - aLikes; // 多い順
      });
    } else if (currentTab === 'following') {
      // フォロー中タブ：自分と、フォローしてる奴だけ残す！
      displayPosts = displayPosts.filter(postObj => {
        const isMe = postObj.data.uid === currentUser?.uid;
        const isFollowing = myFollowingList.includes(postObj.data.uid);
        return isMe || isFollowing;
      });
      // (元々時間順に並んでるからソートは不要)
    }
    // 最新タブ（latest）は何もしない（そのまま時間順）

    displayPosts.forEach((postObj) => {
      feed.insertAdjacentHTML('beforeend', renderTweetHtml(postObj.id, postObj.data));
    });
  }

  // --- 以下プロフ関係（変更なし短縮） ---
  window.openProfile = async function(tUid, name, iconUrl) {
    if (!tUid || tUid === 'undefined') { alert("古すぎて飛べへんぞ💀"); return; }
    switchView('profileView'); currentProfileUid = tUid;
    document.getElementById("profilePageIcon").src = iconUrl; document.getElementById("profilePageName").textContent = name;
    if (currentUser && currentUser.uid === tUid) { document.getElementById("editBioBox").style.display = "block"; document.getElementById("followBtn").style.display = "none"; } 
    else { document.getElementById("editBioBox").style.display = "none"; document.getElementById("followBtn").style.display = "block"; }
    const uSnap = await getDoc(doc(db, "users", tUid));
    let flw=[], flwi=[];
    if (uSnap.exists()) {
      const d = uSnap.data();
      document.getElementById("profilePageBio").textContent = d.bio || "まだBIOが設定されてへんぞ💀";
      document.getElementById("bioInputField").value = d.bio || "";
      if(d.displayName) { document.getElementById("profilePageName").textContent = d.displayName; document.getElementById("nameInputField").value = d.displayName; } 
      else { document.getElementById("nameInputField").value = name; }
      flw = d.followers || []; flwi = d.following || [];
    } else { document.getElementById("profilePageBio").textContent = "まだBIOが設定されてへんぞ💀"; document.getElementById("nameInputField").value = name; }
    document.getElementById("followerCount").textContent = flw.length; document.getElementById("followingCount").textContent = flwi.length;
    const fb = document.getElementById("followBtn");
    if (currentUser && flw.includes(currentUser.uid)) { fb.textContent = "フォロー中"; fb.classList.add("following"); } else { fb.textContent = "フォローする"; fb.classList.remove("following"); }
    const pf = document.getElementById("profileFeed"); pf.innerHTML = "<div style='text-align:center; padding:20px;'>読み込み中...</div>";
    if (profileUnsubscribe) profileUnsubscribe();
    profileUnsubscribe = onSnapshot(query(collection(db, "posts"), where("uid", "==", tUid), orderBy("createdAt", "desc")), (snap) => {
      pf.innerHTML = ""; snap.forEach((doc) => { pf.insertAdjacentHTML('beforeend', renderTweetHtml(doc.id, doc.data())); });
    });
  };
  window.toggleFollow = async function() {
    if (!currentUser) return; const tRef = doc(db, "users", currentProfileUid); const mRef = doc(db, "users", currentUser.uid); 
    const tSnap = await getDoc(tRef); let flw = tSnap.exists() ? tSnap.data().followers || [] : [];
    if (flw.includes(currentUser.uid)) { await setDoc(tRef, { followers: arrayRemove(currentUser.uid) }, { merge: true }); await setDoc(mRef, { following: arrayRemove(currentProfileUid) }, { merge: true }); } 
    else { await setDoc(tRef, { followers: arrayUnion(currentUser.uid) }, { merge: true }); await setDoc(mRef, { following: arrayUnion(currentProfileUid) }, { merge: true }); }
    openProfile(currentProfileUid, document.getElementById("profilePageName").textContent, document.getElementById("profilePageIcon").src);
  };
  window.saveProfile = async function() {
    if (!currentUser) return; const bio = document.getElementById("bioInputField").value; const nName = document.getElementById("nameInputField").value;
    if(!nName.trim()) { alert("名前を空にはできへんぞ！💀"); return; }
    try { await updateProfile(currentUser, { displayName: nName }); await setDoc(doc(db, "users", currentUser.uid), { bio: bio, displayName: nName }, { merge: true });
      document.getElementById("profilePageBio").textContent = bio; document.getElementById("profilePageName").textContent = nName; alert("プロフ更新したで！🔥");
    } catch (e) { console.error(e); }
  };

  const mainQ = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(mainQ, (snapshot) => {
    allPostsData = []; 
    snapshot.forEach((doc) => { allPostsData.push({ id: doc.id, data: doc.data() }); });
    renderMainFeed(); 
  });
</script>
