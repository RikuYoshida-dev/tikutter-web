<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tikutter</title>
<style>
  * { box-sizing: border-box; } 
  body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; }
  .timeline { width: 100%; max-width: 600px; background-color: white; min-height: 100vh; border-left: 1px solid #ccc; border-right: 1px solid #ccc; padding-bottom: 80px; }
  .header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #eee; background-color: rgba(255,255,255,0.9); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  
  .header-icons { display: flex; align-items: center; gap: 8px; }
  .icon-wrap { position: relative; cursor: pointer; font-size: 22px; transition: 0.2s; }
  .icon-wrap:hover { opacity: 0.7; }
  .notif-badge { position: absolute; top: -5px; right: -5px; background: #f4212e; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 50%; display: none; }
  
  .auth-btn { background: #fff; border: 1px solid #ccc; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
  .auth-btn:hover { background: #f0f2f5; }
  .guest-btn { background: #1d9bf0; color: white; border: none; }
  .guest-btn:hover { background: #1a8cd8; }
  
  .tabs { display: flex; border-bottom: 1px solid #eee; background: white; }
  .tab { flex: 1; text-align: center; padding: 12px 2px; cursor: pointer; color: #536471; font-weight: bold; transition: 0.2s; font-size: 14px; }
  .tab:hover { background-color: #f0f2f5; }
  .tab.active { color: #0f1419; border-bottom: 4px solid #1d9bf0; }

  .tweet { padding: 15px; border-bottom: 1px solid #eee; animation: fadeIn 0.5s; display: flex; gap: 10px; }
  .tweet-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: #ccc; flex-shrink: 0; cursor: pointer; }
  .tweet-content { width: 100%; overflow: hidden; }
  .tweet-text-area { cursor: pointer; margin-bottom: 5px; word-break: break-all; white-space: pre-wrap; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .user-info { font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
  .user-name-box { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-id { color: #666; font-size: 12px; font-weight: normal; margin-left: 5px;}
  .delete-btn { color: #f4212e; cursor: pointer; padding: 0 5px; font-size: 18px; }
  
  .action-btns { display: flex; justify-content: space-between; font-size: 14px; user-select: none; margin-top: 5px; padding-right: 10px; }
  .action-item { display: flex; align-items: center; gap: 5px; }
  .action-icon { cursor: pointer; }
  .action-count { cursor: pointer; font-weight: bold; }

  .profile-header { text-align: center; padding: 20px; border-bottom: 10px solid #f0f2f5; }
  .profile-icon-large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); margin-bottom: 10px; }
  .bio-display { margin-top: 10px; white-space: pre-wrap; word-break: break-all; font-size: 14px; }
  .edit-bio-box { margin-top: 15px; display: none; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; }
  .bio-input, .name-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; font-family: sans-serif; }
  .follow-stats { display: flex; justify-content: center; gap: 20px; font-size: 14px; margin-top: 10px; margin-bottom: 15px; }
  .follow-btn { padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; border: 1px solid #ccc; background: white; color: black; display: none; margin: 0 auto; }
  .follow-btn.following { background: #0f1419; color: white; border: none; }
  .back-btn { cursor: pointer; font-size: 16px; background: none; border: none; font-weight: bold; color: #1d9bf0; padding: 0;}
  
  .reply-box { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; padding: 15px; background: #fafafa; }
  .post-btn { background-color: #1d9bf0; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
  .post-btn:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.6; }

  .fab-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #1d9bf0; color: white; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; transition: transform 0.2s; }
  .fab-btn:active { transform: scale(0.9); }

  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; justify-content: center; align-items: center; }
  .post-modal { background: white; width: 95%; max-width: 400px; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideDown 0.3s; }
  @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .close-modal-btn { font-size: 24px; cursor: pointer; color: #536471; font-weight: bold; }
  .modal-textarea { width: 100%; height: 100px; border: none; resize: none; font-size: 18px; outline: none; margin-bottom: 10px; background: transparent; }

  /* 👇 【新規】認証モーダル用のデザインバフ！ */
  .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
  .auth-divider { text-align: center; color: #666; font-size: 12px; margin: 15px 0; position: relative; }
  .auth-divider::before, .auth-divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #eee; }
  .auth-divider::before { left: 0; } .auth-divider::after { right: 0; }
  .google-login-btn { width: 100%; padding: 12px; background: white; border: 1px solid #ccc; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
  .google-login-btn:hover { background: #f0f2f5; }

  @media (max-width: 600px) {
    .timeline { border-left: none; border-right: none; }
    .header { font-size: 18px; padding: 10px 15px; }
    .tweet { padding: 12px; gap: 8px; }
    .tweet-icon { width: 40px; height: 40px; }
    .fab-btn { bottom: 15px; right: 15px; width: 55px; height: 55px; font-size: 24px; }
  }
</style>
</head>
<body>

<div id="timelineView" class="timeline">
  <div class="header">
    <span>Tikutter</span>
    <div class="header-icons">
      <div id="userIconsArea" style="display: none; align-items: center; gap: 8px;">
        <div class="icon-wrap" title="マイページ" onclick="openMyProfile()">👤</div>
        <div class="icon-wrap" title="ブックマーク" onclick="openBookmarks()">🔖</div>
        <div class="icon-wrap" title="通知" onclick="openNotifications()">🔔<span id="notifBadge" class="notif-badge">0</span></div>
      </div>
      
      <button id="guestLoginBtn" class="auth-btn guest-btn" onclick="guestLogin()">ゲスト</button>
      <button id="loginBtn" class="auth-btn" onclick="openAuthModal()">ログイン</button>
      <button id="logoutBtn" class="auth-btn" onclick="logout()" style="display: none;">ログアウト</button>
    </div>
  </div>

  <div class="tabs">
    <div id="tabRecommend" class="tab active" onclick="switchTab('recommend')">おすすめ</div>
    <div id="tabLatest" class="tab" onclick="switchTab('latest')">最新</div>
    <div id="tabFollowing" class="tab" onclick="switchTab('following')">フォロー中</div>
  </div>

  <div id="guestMessage" style="text-align: center; padding: 10px; font-size: 12px; color: #666; background: #f8f9fa;">
    現在は未ログイン（見るだけモード）や！投稿するならログインしてな💀
  </div>

  <div id="feed"></div>
</div>

<div id="profileView" class="timeline" style="display: none;">
  <div class="header">
    <button class="back-btn" onclick="switchView('timelineView')">←</button>
    <span id="profileHeaderName" style="font-size: 18px;">プロフィール</span><div style="width: 20px;"></div>
  </div>
  <div class="profile-header">
    <img id="profilePageIcon" src="" class="profile-icon-large">
    <h2 id="profilePageName" style="margin: 0; font-size: 20px;">名前</h2>
    <div class="follow-stats"><span><b id="followingCount">0</b> フォロー中</span><span><b id="followerCount">0</b> フォロワー</span></div>
    <button id="followBtn" class="follow-btn" onclick="toggleFollow()">フォローする</button>
    <div id="profilePageBio" class="bio-display">読み込み中...</div>
    <div id="editBioBox" class="edit-bio-box">
      <span class="edit-label">名前</span><input type="text" id="nameInputField" class="name-input">
      <span class="edit-label">BIO</span><textarea id="bioInputField" class="bio-input"></textarea><br>
      <button class="post-btn" style="width: 100%;" onclick="saveProfile()">更新する🔥</button>
    </div>
  </div>
  <div id="profileFeed"></div>
</div>

<div id="detailView" class="timeline" style="display: none;">
  <div class="header">
    <button class="back-btn" onclick="switchView('timelineView')">←</button>
    <span style="font-size: 18px;">ツイート</span><div style="width: 20px;"></div>
  </div>
  <div id="parentPostArea"></div>
  <div class="reply-box">
    <textarea id="replyInput" class="modal-textarea" placeholder="返信をポスト..." disabled></textarea>
    <div style="display:flex; justify-content:flex-end;"><button id="replyBtn" class="post-btn" onclick="sendReply()" disabled>返信する</button></div>
  </div>
  <div id="repliesFeed"></div>
</div>

<div id="bookmarksView" class="timeline" style="display: none;"><div class="header"><button class="back-btn" onclick="switchView('timelineView')">←</button><span style="font-size: 18px;">ブックマーク</span><div style="width: 20px;"></div></div><div id="bookmarksFeed"></div></div>
<div id="reactionUsersView" class="timeline" style="display: none;"><div class="header"><button class="back-btn" onclick="switchView('detailView')">←</button><span id="reactionHeaderTitle" style="font-size: 18px;">反応したユーザー</span><div style="width: 20px;"></div></div><div id="reactionUsersList"></div></div>
<div id="notifView" class="timeline" style="display: none;"><div class="header"><button class="back-btn" onclick="switchView('timelineView')">←</button><span style="font-size: 18px;">通知</span><div style="width: 20px;"></div></div><div id="notifFeed"></div></div>

<div class="fab-btn" onclick="openPostModal()">T</div>

<div id="postModalOverlay" class="modal-overlay" style="display:none;" onclick="closePostModal(event)">
  <div class="post-modal" onclick="event.stopPropagation()" style="align-self: flex-start; margin-top: 10vh;">
    <div class="modal-header">
      <span class="close-modal-btn" onclick="closePostModal()">×</span>
      <button id="modalPostBtn" class="post-btn" onclick="sendPostFromModal()" disabled>ポストする</button>
    </div>
    <textarea id="modalInput" class="modal-textarea" placeholder="いまどうしてる？" oninput="checkModalInput()"></textarea>
  </div>
</div>

<div id="authModalOverlay" class="modal-overlay" style="display:none;" onclick="closeAuthModal(event)">
  <div class="post-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="close-modal-btn" onclick="closeAuthModal()">×</span>
      <span style="font-weight:bold; font-size:18px;">ログイン / 新規登録</span>
      <div style="width:24px;"></div>
    </div>
    
    <input type="email" id="emailInput" class="auth-input" placeholder="メールアドレス">
    <input type="password" id="pwInput" class="auth-input" placeholder="パスワード (6文字以上)">
    
    <div style="display:flex; gap:10px; margin-top:5px;">
      <button class="post-btn" style="flex:1;" onclick="emailLogin()">ログイン</button>
      <button class="auth-btn" style="flex:1; border: 1px solid #1d9bf0; color:#1d9bf0;" onclick="emailSignUp()">新規登録</button>
    </div>

    <div class="auth-divider">または</div>

    <button class="google-login-btn" onclick="googleLogin()">
      <span style="font-size:18px;">G</span> Googleでログイン
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, getDoc, arrayUnion, arrayRemove, setDoc, where, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
  // 👇 メアド関連の魔法（createUserWithEmailAndPassword, signInWithEmailAndPassword）を追加！
  import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, signOut, onAuthStateChanged, updateProfile, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwmjTxHuhEvwa8LGjSGO37c6i-EvyamC8",
    authDomain: "tikutter.firebaseapp.com",
    projectId: "tikutter",
    storageBucket: "tikutter.firebasestorage.app",
    messagingSenderId: "118705198737",
    appId: "1:118705198737:web:47b10639061cc59142d130",
    measurementId: "G-CGGYZPPYZ8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  
  let currentUser = null; 
  let currentProfileUid = null; 
  let currentDetailPostId = null; 
  let profileUnsubscribe = null; 
  let myUnsubscribe = null; 
  let notifUnsubscribe = null; 

  let currentTab = 'recommend'; 
  let allPostsData = []; 
  let myFollowingList = []; 
  let unreadNotifDocs = []; 

  // --- SPA画面切り替え ---
  window.switchView = function(viewId) {
    const views = ["timelineView", "profileView", "detailView", "reactionUsersView", "notifView", "bookmarksView"];
    views.forEach(id => document.getElementById(id).style.display = "none");
    document.getElementById(viewId).style.display = "block";
    window.scrollTo(0, 0); 
    if(viewId === 'timelineView' && profileUnsubscribe) { profileUnsubscribe(); profileUnsubscribe = null; } 
  };

  window.openMyProfile = function() {
    if(!currentUser) { alert("ログインせんとマイページはないぞ！💀"); return; }
    openProfile(currentUser.uid, currentUser.displayName, currentUser.photoURL);
  };

  // --- 投稿モーダル ---
  window.openPostModal = function() {
    if (!currentUser) { alert("ログインせんと叫べへんぞ！💀"); return; }
    document.getElementById("postModalOverlay").style.display = "flex";
    document.getElementById("modalInput").focus();
    checkModalInput();
  };
  window.closePostModal = function(e) {
    if(e && e.target.id !== "postModalOverlay") return; 
    document.getElementById("postModalOverlay").style.display = "none";
    document.getElementById("modalInput").value = "";
  };
  window.checkModalInput = function() {
    document.getElementById("modalPostBtn").disabled = (document.getElementById("modalInput").value.trim() === "");
  };

  // 🔥 【新規】認証モーダルの開閉魔法
  window.openAuthModal = function() {
    document.getElementById('authModalOverlay').style.display = 'flex';
  };
  window.closeAuthModal = function(e) {
    if(e && e.target.id !== 'authModalOverlay') return;
    document.getElementById('authModalOverlay').style.display = 'none';
  };

  // 🔥 【新規】メアドで新規登録する魔法！
  window.emailSignUp = async function() {
    const email = document.getElementById('emailInput').value;
    const pw = document.getElementById('pwInput').value;
    if(!email || pw.length < 6) { alert('メアドと6文字以上のパスワードを入れろや！💀'); return; }
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, pw);
      // メアド登録直後は名前がないから、デフォルトの名前とアイコンを付与するバフ！
      await updateProfile(userCred.user, { 
        displayName: "新規ユーザー", 
        photoURL: "https://via.placeholder.com/48/1d9bf0/ffffff?text=U" 
      });
      closeAuthModal();
    } catch(e) { console.error(e); alert('登録エラーや！メアドの形式がおかしいか、既に登録されとるかも！💀'); }
  };

  // 🔥 【新規】メアドでログインする魔法！
  window.emailLogin = async function() {
    const email = document.getElementById('emailInput').value;
    const pw = document.getElementById('pwInput').value;
    if(!email || !pw) return;
    try {
      await signInWithEmailAndPassword(auth, email, pw);
      closeAuthModal();
    } catch(e) { console.error(e); alert('ログインエラーや！メアドかパスワード間違ってへんか？💀'); }
  };

  // Googleログイン（名前をちょっと変えたぞ）
  window.googleLogin = async function() { 
    try { await signInWithPopup(auth, provider); closeAuthModal(); } catch(e) { console.error(e); } 
  };
  
  window.guestLogin = async function() { 
    try { await signInAnonymously(auth); } catch(e) { console.error(e); alert("Firebaseで匿名認証の設定オンにしとるか！？"); } 
  };
  
  window.logout = async function() { await signOut(auth); };

  onAuthStateChanged(auth, async (user) => {
    const loginBtn = document.getElementById("loginBtn"); 
    const guestLoginBtn = document.getElementById("guestLoginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userIconsArea = document.getElementById("userIconsArea");
    const guestMessage = document.getElementById("guestMessage");
    const replyBtn = document.getElementById("replyBtn"); 
    const replyInput = document.getElementById("replyInput");

    if (user) {
      // ゲストや、メアド登録したてで名前がない奴に名前を強制付与するバフ！
      if (!user.displayName) {
        const defaultName = user.isAnonymous ? "名無しゲスト" : "新規ユーザー";
        const defaultIcon = user.isAnonymous ? "https://via.placeholder.com/48/1d9bf0/ffffff?text=G" : "https://via.placeholder.com/48/f4212e/ffffff?text=U";
        await updateProfile(user, { displayName: defaultName, photoURL: defaultIcon });
      }

      currentUser = user;
      loginBtn.style.display = "none"; guestLoginBtn.style.display = "none"; 
      logoutBtn.style.display = "inline-block"; userIconsArea.style.display = "flex";
      guestMessage.style.display = "none";
      if(replyBtn) replyBtn.disabled = false; if(replyInput) replyInput.disabled = false;
      
      await setDoc(doc(db, "users", user.uid), { displayName: user.displayName, photoURL: user.photoURL }, { merge: true });

      if(myUnsubscribe) myUnsubscribe();
      myUnsubscribe = onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
        if(docSnap.exists()) myFollowingList = docSnap.data().following || [];
        renderMainFeed(); 
      });

      if(notifUnsubscribe) notifUnsubscribe();
      notifUnsubscribe = onSnapshot(query(collection(db, "notifications"), where("targetUid", "==", currentUser.uid)), (snapshot) => {
        unreadNotifDocs = []; let notifs = [];
        snapshot.forEach(doc => { notifs.push({ id: doc.id, data: doc.data() }); if(!doc.data().isRead) unreadNotifDocs.push(doc.id); });
        const badge = document.getElementById("notifBadge");
        if(unreadNotifDocs.length > 0) { badge.textContent = unreadNotifDocs.length; badge.style.display = "inline-block"; } else { badge.style.display = "none"; }
        notifs.sort((a,b) => (b.data.createdAt?.toMillis() || 0) - (a.data.createdAt?.toMillis() || 0));
        renderNotifs(notifs);
      });
    } else {
      currentUser = null;
      loginBtn.style.display = "inline-block"; guestLoginBtn.style.display = "inline-block";
      logoutBtn.style.display = "none"; userIconsArea.style.display = "none";
      guestMessage.style.display = "block";
      if(replyBtn) replyBtn.disabled = true; if(replyInput) replyInput.disabled = true;
      myFollowingList = []; document.getElementById("notifBadge").style.display = "none";
      if(myUnsubscribe) myUnsubscribe(); if(notifUnsubscribe) notifUnsubscribe();
      renderMainFeed(); 
    }
  });

  window.openNotifications = function() {
    if(!currentUser) return; switchView('notifView');
    document.getElementById("notifBadge").style.display = "none";
    unreadNotifDocs.forEach(notifId => { updateDoc(doc(db, "notifications", notifId), { isRead: true }); });
    unreadNotifDocs = [];
  };

  function renderNotifs(notifs) {
    const feed = document.getElementById("notifFeed");
    if(notifs.length === 0) { feed.innerHTML = "<div style='padding:20px; text-align:center; color:#536471;'>通知はまだないぞ！</div>"; return; }
    let html = '';
    notifs.forEach(n => {
      const d = n.data; const time = d.createdAt ? d.createdAt.toDate().toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'}) : "";
      let msg = d.type === 'like' ? '❤️ あなたの投稿にいいねしました' : '💬 あなたの投稿に返信しました';
      html += `<div class="tweet" style="cursor: pointer;" onclick="openTweetDetail('${d.postId}')"><img src="${d.fromIcon || 'https://via.placeholder.com/48'}" class="tweet-icon"><div style="width: 100%;"><div style="font-weight:bold; font-size:14px;">${d.fromName} <span style="font-weight:normal; color:#666; font-size:12px;">${time}</span></div><div style="color:#536471; font-size:14px; margin-top:5px;">${msg}</div></div></div>`;
    });
    feed.innerHTML = html;
  }

  window.copyTweetText = function(encodedText) {
    const text = decodeURIComponent(encodedText); 
    navigator.clipboard.writeText(text).then(() => { alert("文章をコピーしたで！🔥"); }).catch(e => console.error(e));
  };

  function renderTweetHtml(docId, post) {
    const date = post.createdAt ? post.createdAt.toDate().toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'}) : "送信中...";
    const likesArr = Array.isArray(post.likes) ? post.likes : [];
    const isLiked = currentUser ? likesArr.includes(currentUser.uid) : false;
    const heartColor = isLiked ? "#f91880" : "#536471";
    
    const rtArr = Array.isArray(post.retweets) ? post.retweets : [];
    const rtColor = currentUser && rtArr.includes(currentUser.uid) ? "#00ba7c" : "#536471";
    
    const bmArr = Array.isArray(post.bookmarks) ? post.bookmarks : [];
    const isBm = currentUser ? bmArr.includes(currentUser.uid) : false;
    const bmColor = isBm ? "#1d9bf0" : "#536471";

    const iconUrl = post.userIcon || "https://via.placeholder.com/48/cccccc/ffffff?text=User";
    const deleteBtn = (currentUser && currentUser.uid === post.uid) ? `<span class="delete-btn" onclick="deletePost('${docId}')">※</span>` : ``;
    const safeText = encodeURIComponent(post.text || ""); 

    const actionBtns = `
       <div class="action-item"><span class="action-icon" onclick="openTweetDetail('${docId}')">💬</span><span class="action-count" onclick="openTweetDetail('${docId}')">${post.replyCount || 0}</span></div>
       <div class="action-item"><span class="action-icon" onclick="rtPost('${docId}')" style="color: ${rtColor};">🔄</span><span class="action-count" onclick="openReactions('${docId}', 'retweets')" style="color: ${rtColor};">${rtArr.length}</span></div>
       <div class="action-item"><span class="action-icon" onclick="likePost('${docId}')" style="color: ${heartColor};">❤️</span><span class="action-count" onclick="openReactions('${docId}', 'likes')" style="color: ${heartColor};">${likesArr.length}</span></div>
       <div class="action-item"><span class="action-icon" onclick="toggleBookmark('${docId}')" style="color: ${bmColor};">🔖</span><span class="action-count" style="color: ${bmColor}; cursor: default;">${bmArr.length}</span></div>
       <div class="action-item"><span class="action-icon" onclick="copyTweetText('${safeText}')" title="テキストをコピー">🔗</span></div>
    `;

    return `
      <div class="tweet">
        <img src="${iconUrl}" class="tweet-icon" onclick="openProfile('${post.uid}', '${post.userId}', '${iconUrl}')">
        <div class="tweet-content">
          <div class="user-info"><div class="user-name-box">${post.userId || "名無し"} <span class="user-id">@user</span> <span style="color: #666; font-size: 11px; margin-left: 5px;">${date}</span></div>${deleteBtn}</div>
          <div class="tweet-text-area" onclick="openTweetDetail('${docId}')">${post.text}</div>
          <div class="action-btns">${actionBtns}</div>
        </div>
      </div>
    `;
  }

  window.sendPostFromModal = async function() {
    if (!currentUser) return;
    const text = document.getElementById("modalInput").value; const btn = document.getElementById("modalPostBtn");
    if (text.trim() === "") return;
    btn.disabled = true; btn.textContent = "送信中..."; 
    try {
      await addDoc(collection(db, "posts"), { 
        text: text, imageUrl: null, parentId: null, 
        createdAt: serverTimestamp(), userId: currentUser.displayName, userIcon: currentUser.photoURL, uid: currentUser.uid, 
        likes: [], retweets: [], bookmarks: [], replyCount: 0 
      });
      closePostModal(); 
    } catch (e) { console.error(e); alert("エラーや！💀"); }
    btn.disabled = false; btn.textContent = "ポストする";
  };

  window.deletePost = async function(docId) {
    if (!currentUser) return;
    if (confirm("このツイートをガチで消去するんか？💀")) {
      try { await deleteDoc(doc(db, "posts", docId)); if (document.getElementById('detailView').style.display === 'block') switchView('timelineView'); } catch (e) { console.error(e); }
    }
  };

  window.openReactions = async function(docId, type) {
    switchView('reactionUsersView'); document.getElementById('reactionHeaderTitle').textContent = type === 'likes' ? '❤️ いいねした人' : '🔄 リツイートした人';
    const listArea = document.getElementById('reactionUsersList'); listArea.innerHTML = "<div style='padding: 20px; text-align: center;'>読み込み中...</div>";
    const docSnap = await getDoc(doc(db, "posts", docId));
    if (!docSnap.exists() || !docSnap.data()[type] || docSnap.data()[type].length === 0) { listArea.innerHTML = "<div style='padding: 20px; text-align: center; color: #536471;'>まだ誰も反応してへんぞ💀</div>"; return; }
    let html = ''; const userSnaps = await Promise.all(docSnap.data()[type].map(uid => getDoc(doc(db, "users", uid))));
    userSnaps.forEach(userSnap => { let name = "名無し", icon = "https://via.placeholder.com/48", uid = ""; if (userSnap.exists()) { name = userSnap.data().displayName || name; icon = userSnap.data().photoURL || icon; uid = userSnap.id; }
      html += `<div class="tweet" style="align-items: center; cursor: pointer;" onclick="openProfile('${uid}', '${name}', '${icon}')"><img src="${icon}" class="tweet-icon"><div style="font-weight: bold; font-size: 16px;">${name}</div></div>`; });
    listArea.innerHTML = html;
  };

  window.likePost = async function(postId) {
    if (!currentUser) { alert("ログイン（またはゲスト）せんと推せへんぞ！💀"); return; }
    const ref = doc(db, "posts", postId); const snap = await getDoc(ref);
    if (snap.exists()) { const p = snap.data(); const arr = Array.isArray(p.likes) ? p.likes : []; const isAdd = !arr.includes(currentUser.uid);
      await updateDoc(ref, { likes: isAdd ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid) });
      if(isAdd && p.uid !== currentUser.uid) { addDoc(collection(db, "notifications"), { targetUid: p.uid, fromUid: currentUser.uid, fromName: currentUser.displayName, fromIcon: currentUser.photoURL, type: 'like', postId: postId, isRead: false, createdAt: serverTimestamp() }); }
    }
  };
  window.rtPost = async function(postId) { 
    if (!currentUser) { alert("ログインせんとアカン！"); return; }
    const ref = doc(db, "posts", postId); const snap = await getDoc(ref); if (snap.exists()) await updateDoc(ref, { retweets: !snap.data().retweets?.includes(currentUser.uid) ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid) }); 
  };
  window.toggleBookmark = async function(postId) {
    if (!currentUser) { alert("ログインせんとアカン！"); return; }
    const ref = doc(db, "posts", postId); const snap = await getDoc(ref);
    if (snap.exists()) { const arr = Array.isArray(snap.data().bookmarks) ? snap.data().bookmarks : [];
      await updateDoc(ref, { bookmarks: !arr.includes(currentUser.uid) ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid) });
    }
  };

  window.openTweetDetail = async function(postId) {
    switchView('detailView'); currentDetailPostId = postId;
    const parentData = allPostsData.find(p => p.id === postId);
    if(parentData) { document.getElementById("parentPostArea").innerHTML = renderTweetHtml(parentData.id, parentData.data); } else { document.getElementById("parentPostArea").innerHTML = "<div style='padding:20px;'>ツイートが見つからんぞ💀</div>"; }

    const repliesFeed = document.getElementById("repliesFeed"); repliesFeed.innerHTML = "";
    const replies = allPostsData.filter(p => p.data.parentId === postId);
    replies.sort((a,b) => (a.data.createdAt?.toMillis() || 0) - (b.data.createdAt?.toMillis() || 0));
    if(replies.length === 0) repliesFeed.innerHTML = "<div style='text-align:center; padding:20px; color:#536471;'>まだリプライはないぞ！</div>";
    replies.forEach(r => repliesFeed.insertAdjacentHTML('beforeend', renderTweetHtml(r.id, r.data)));
  };

  window.sendReply = async function() {
    if (!currentUser || !currentDetailPostId) return; 
    const input = document.getElementById("replyInput"); const text = input.value; if (text.trim() === "") return;
    document.getElementById("replyBtn").disabled = true;
    try {
      await addDoc(collection(db, "posts"), { 
        text: text, imageUrl: null, parentId: currentDetailPostId, 
        createdAt: serverTimestamp(), userId: currentUser.displayName, userIcon: currentUser.photoURL, uid: currentUser.uid, 
        likes: [], retweets: [], bookmarks: [], replyCount: 0 
      });
      await updateDoc(doc(db, "posts", currentDetailPostId), { replyCount: increment(1) });
      const parentData = allPostsData.find(p => p.id === currentDetailPostId);
      if(parentData && parentData.data.uid !== currentUser.uid) { addDoc(collection(db, "notifications"), { targetUid: parentData.data.uid, fromUid: currentUser.uid, fromName: currentUser.displayName, fromIcon: currentUser.photoURL, type: 'reply', postId: currentDetailPostId, isRead: false, createdAt: serverTimestamp() }); }
      input.value = "";
    } catch (e) { console.error(e); }
    document.getElementById("replyBtn").disabled = false;
  };

  window.switchTab = function(tabName) {
    if(tabName === 'following' && !currentUser) { alert("ログインせんと見れへんぞ！💀"); return; }
    currentTab = tabName; ["tabRecommend", "tabLatest", "tabFollowing"].forEach(id => document.getElementById(id).classList.remove("active"));
    if(tabName === 'recommend') document.getElementById("tabRecommend").classList.add("active"); else if(tabName === 'latest') document.getElementById("tabLatest").classList.add("active"); else document.getElementById("tabFollowing").classList.add("active");
    renderMainFeed();
  };

  function renderMainFeed() {
    const feed = document.getElementById("feed"); if(!feed) return; feed.innerHTML = ""; 
    let displayPosts = allPostsData.filter(p => !p.data.parentId);

    if (currentTab === 'recommend') { 
      displayPosts.sort((a, b) => { const aL = Array.isArray(a.data.likes) ? a.data.likes.length : 0; const bL = Array.isArray(b.data.likes) ? b.data.likes.length : 0; return bL - aL; }); 
    } else if (currentTab === 'following') { 
      displayPosts = displayPosts.filter(p => p.data.uid === currentUser?.uid || myFollowingList.includes(p.data.uid)); 
    }
    displayPosts.forEach((p) => { feed.insertAdjacentHTML('beforeend', renderTweetHtml(p.id, p.data)); });
  }

  window.openBookmarks = function() {
    if(!currentUser) { alert("ログインせんとブックマークは見れへんぞ！💀"); return; }
    switchView('bookmarksView');
    const feed = document.getElementById("bookmarksFeed"); feed.innerHTML = "";
    const bmPosts = allPostsData.filter(p => { const arr = Array.isArray(p.data.bookmarks) ? p.data.bookmarks : []; return arr.includes(currentUser.uid); });
    if(bmPosts.length === 0) feed.innerHTML = "<div style='padding:20px; text-align:center; color:#536471;'>まだ何もブックマークしてへんぞ！🔖</div>";
    bmPosts.forEach(p => feed.insertAdjacentHTML('beforeend', renderTweetHtml(p.id, p.data)));
  }

  window.openProfile = async function(tUid, name, iconUrl) {
    if (!tUid || tUid === 'undefined') { alert("古すぎて飛べへんぞ💀"); return; } switchView('profileView'); currentProfileUid = tUid;
    document.getElementById("profilePageIcon").src = iconUrl; document.getElementById("profilePageName").textContent = name;
    if (currentUser && currentUser.uid === tUid) { document.getElementById("editBioBox").style.display = "block"; document.getElementById("followBtn").style.display = "none"; } 
    else { document.getElementById("editBioBox").style.display = "none"; document.getElementById("followBtn").style.display = "block"; }
    const uSnap = await getDoc(doc(db, "users", tUid)); let flw=[], flwi=[];
    if (uSnap.exists()) { const d = uSnap.data(); document.getElementById("profilePageBio").textContent = d.bio || "まだBIOが設定されてへんぞ💀"; document.getElementById("bioInputField").value = d.bio || "";
      if(d.displayName) { document.getElementById("profilePageName").textContent = d.displayName; document.getElementById("nameInputField").value = d.displayName; } else { document.getElementById("nameInputField").value = name; }
      flw = d.followers || []; flwi = d.following || [];
    } else { document.getElementById("profilePageBio").textContent = "まだBIOが設定されてへんぞ💀"; document.getElementById("nameInputField").value = name; }
    document.getElementById("followerCount").textContent = flw.length; document.getElementById("followingCount").textContent = flwi.length;
    const fb = document.getElementById("followBtn"); if (currentUser && flw.includes(currentUser.uid)) { fb.textContent = "フォロー中"; fb.classList.add("following"); } else { fb.textContent = "フォローする"; fb.classList.remove("following"); }
    const pf = document.getElementById("profileFeed"); pf.innerHTML = "<div style='text-align:center; padding:20px;'>読み込み中...</div>";
    if (profileUnsubscribe) profileUnsubscribe();
    profileUnsubscribe = onSnapshot(query(collection(db, "posts"), where("uid", "==", tUid), orderBy("createdAt", "desc")), (snap) => { 
      pf.innerHTML = ""; snap.forEach((doc) => { if(!doc.data().parentId) { pf.insertAdjacentHTML('beforeend', renderTweetHtml(doc.id, doc.data())); }}); 
    });
  };

  window.toggleFollow = async function() {
    if (!currentUser) { alert("ログインせんとアカン！"); return; }
    const tRef = doc(db, "users", currentProfileUid); const mRef = doc(db, "users", currentUser.uid); 
    const tSnap = await getDoc(tRef); let flw = tSnap.exists() ? tSnap.data().followers || [] : [];
    if (flw.includes(currentUser.uid)) { await setDoc(tRef, { followers: arrayRemove(currentUser.uid) }, { merge: true }); await setDoc(mRef, { following: arrayRemove(currentProfileUid) }, { merge: true }); } 
    else { await setDoc(tRef, { followers: arrayUnion(currentUser.uid) }, { merge: true }); await setDoc(mRef, { following: arrayUnion(currentProfileUid) }, { merge: true }); }
    openProfile(currentProfileUid, document.getElementById("profilePageName").textContent, document.getElementById("profilePageIcon").src);
  };
  
  window.saveProfile = async function() {
    if (!currentUser) return; const bio = document.getElementById("bioInputField").value; const nName = document.getElementById("nameInputField").value;
    if(!nName.trim()) { alert("名前を空にはできへんぞ！💀"); return; }
    try { await updateProfile(currentUser, { displayName: nName }); await setDoc(doc(db, "users", currentUser.uid), { bio: bio, displayName: nName }, { merge: true });
      document.getElementById("profilePageBio").textContent = bio; document.getElementById("profilePageName").textContent = nName; alert("プロフ更新したで！🔥");
    } catch (e) { console.error(e); }
  };

  const mainQ = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(mainQ, (snapshot) => { 
    allPostsData = []; 
    snapshot.forEach((doc) => { allPostsData.push({ id: doc.id, data: doc.data() }); }); 
    if(document.getElementById('timelineView').style.display !== 'none') renderMainFeed(); 
    if(document.getElementById('detailView').style.display !== 'none' && currentDetailPostId) openTweetDetail(currentDetailPostId);
    if(document.getElementById('bookmarksView').style.display !== 'none') window.openBookmarks();
  });
</script>

</body>
</html>
