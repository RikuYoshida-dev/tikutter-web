<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SNS Tikutter</title>
<style>
  body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; }
  .timeline { width: 100%; max-width: 600px; background-color: white; min-height: 100vh; border-left: 1px solid #ccc; border-right: 1px solid #ccc; }
  .header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #eee; background-color: rgba(255,255,255,0.9); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  .auth-area { font-size: 14px; font-weight: normal; display: flex; align-items: center; gap: 10px; }
  .auth-btn { background: #fff; border: 1px solid #ccc; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
  .post-box { padding: 15px; border-bottom: 10px solid #f0f2f5; }
  .post-input { width: 100%; height: 80px; border: none; resize: none; font-size: 18px; outline: none; }
  .post-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .add-image { color: #1d9bf0; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 15px; }
  .post-btn { background-color: #1d9bf0; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
  .post-btn:disabled { background-color: #ccc; cursor: not-allowed; }
  
  /* 👇 アイコン周りのカッコええデザイン（新規バフ）や！ */
  .tweet { padding: 15px; border-bottom: 1px solid #eee; animation: fadeIn 0.5s; display: flex; gap: 10px; }
  .tweet-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: #ccc; flex-shrink: 0; }
  .tweet-content { width: 100%; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .user-info { font-weight: bold; margin-bottom: 5px; }
  .user-id { color: #666; font-size: 14px; font-weight: normal; margin-left: 5px;}
  .tweet-text { margin-bottom: 10px; word-break: break-all; white-space: pre-wrap; }
  .action-btns { display: flex; gap: 20px; font-size: 14px; user-select: none; }
</style>
</head>
<body>

<div class="timeline">
  <div class="header">
    <span>ホーム</span>
    <div class="auth-area">
      <span id="userNameDisplay">未ログイン💀</span>
      <button id="loginBtn" class="auth-btn" onclick="login()">ログイン</button>
      <button id="logoutBtn" class="auth-btn" onclick="logout()" style="display: none;">ログアウト</button>
    </div>
  </div>

  <div class="post-box">
    <textarea id="myInput" class="post-input" placeholder="ログインすると世界に叫べるぞ！" disabled></textarea>
    <div class="post-actions">
      <span class="add-image">📷 画像を追加</span>
      <button id="postBtn" class="post-btn" onclick="sendPost()" disabled>投稿する</button>
    </div>
  </div>
  
  <div id="feed"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwmjTxHuhEvwa8LGjSGO37c6i-EvyamC8",
    authDomain: "tikutter.firebaseapp.com",
    projectId: "tikutter",
    storageBucket: "tikutter.firebasestorage.app",
    messagingSenderId: "118705198737",
    appId: "1:118705198737:web:47b10639061cc59142d130",
    measurementId: "G-CGGYZPPYZ8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  let currentUser = null; 

  window.login = async function() {
    try { await signInWithPopup(auth, provider); } 
    catch(e) { console.error("ログイン失敗や！", e); }
  };

  window.logout = async function() { await signOut(auth); };

  onAuthStateChanged(auth, (user) => {
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userNameDisplay = document.getElementById("userNameDisplay");
    const postBtn = document.getElementById("postBtn");
    const myInput = document.getElementById("myInput");

    if (user) {
      currentUser = user;
      userNameDisplay.textContent = user.displayName + " 🔥";
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      postBtn.disabled = false;
      myInput.disabled = false;
      myInput.placeholder = "いまどうしてる？";
    } else {
      currentUser = null;
      userNameDisplay.textContent = "未ログイン💀";
      loginBtn.style.display = "inline-block";
      logoutBtn.style.display = "none";
      postBtn.disabled = true;
      myInput.disabled = true;
      myInput.placeholder = "ログインすると世界に叫べるぞ！";
    }
  });

  window.sendPost = async function() {
    if (!currentUser) return;
    const input = document.getElementById("myInput");
    const btn = document.getElementById("postBtn");
    const text = input.value;
    if (text.trim() === "") return;

    btn.disabled = true;
    try {
      await addDoc(collection(db, "posts"), {
        text: text,
        createdAt: serverTimestamp(),
        userId: currentUser.displayName,
        // 👇 ここでGoogleのアイコンURL（photoURL）を一緒に金庫へぶち込むんや！
        userIcon: currentUser.photoURL,
        likes: [],
        retweets: []
      });
      input.value = "";
    } catch (e) {
      console.error("保存失敗や！: ", e);
    }
    btn.disabled = false;
  };

  window.likePost = async function(postId) {
    if (!currentUser) { alert("ログインせんと推せへんぞ！💀"); return; }
    const postRef = doc(db, "posts", postId);
    const postSnap = await getDoc(postRef);
    if (postSnap.exists()) {
      const post = postSnap.data();
      const likesArray = Array.isArray(post.likes) ? post.likes : [];
      if (likesArray.includes(currentUser.uid)) {
        await updateDoc(postRef, { likes: arrayRemove(currentUser.uid) });
      } else {
        await updateDoc(postRef, { likes: arrayUnion(currentUser.uid) });
      }
    }
  };

  window.rtPost = async function(postId) {
    if (!currentUser) { alert("ログインせんと拡散できへんぞ！💀"); return; }
    const postRef = doc(db, "posts", postId);
    const postSnap = await getDoc(postRef);
    if (postSnap.exists()) {
      const post = postSnap.data();
      const rtArray = Array.isArray(post.retweets) ? post.retweets : [];
      if (rtArray.includes(currentUser.uid)) {
        await updateDoc(postRef, { retweets: arrayRemove(currentUser.uid) });
      } else {
        await updateDoc(postRef, { retweets: arrayUnion(currentUser.uid) });
      }
    }
  };

  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = ""; 
    
    snapshot.forEach((doc) => {
      const post = doc.data();
      const date = post.createdAt ? post.createdAt.toDate().toLocaleString('ja-JP') : "送信中...";

      const likesArray = Array.isArray(post.likes) ? post.likes : [];
      const likesCount = likesArray.length || (typeof post.likes === 'number' ? post.likes : 0);
      const isLiked = currentUser ? likesArray.includes(currentUser.uid) : false;
      const heartColor = isLiked ? "#f91880" : "#536471";

      const rtArray = Array.isArray(post.retweets) ? post.retweets : [];
      const rtCount = rtArray.length || (typeof post.retweets === 'number' ? post.retweets : 0);
      const isRt = currentUser ? rtArray.includes(currentUser.uid) : false;
      const rtColor = isRt ? "#00ba7c" : "#536471";

      // 👇 過去の投稿でアイコンが無い奴用には、灰色のダミー画像を表示する防御バフや！
      const iconUrl = post.userIcon ? post.userIcon : "https://via.placeholder.com/48/cccccc/ffffff?text=User";

      const tweetHtml = `
        <div class="tweet">
          <img src="${iconUrl}" class="tweet-icon" alt="アイコン">
          
          <div class="tweet-content">
            <div class="user-info">
              ${post.userId || "名無し"} <span class="user-id">@user</span>
              <span style="color: #666; font-size: 12px; font-weight: normal; margin-left: 5px;">${date}</span>
            </div>
            <div class="tweet-text">${post.text}</div>
            <div class="action-btns">
              <span onclick="rtPost('${doc.id}')" style="cursor:pointer; color: ${rtColor};">🔄 ${rtCount}</span>
              <span onclick="likePost('${doc.id}')" style="cursor:pointer; color: ${heartColor};">❤️ ${likesCount}</span>
            </div>
          </div>
        </div>
      `;
      feed.insertAdjacentHTML('beforeend', tweetHtml);
    });
  });
</script>

</body>
</html>
